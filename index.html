<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Marble Roulette · haru-hub</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- 3D 렌더 캔버스 -->
    <canvas id="stage"></canvas>

    <!-- 로딩 / 에러 오버레이 -->
    <div id="status" class="status">
      <div class="status-card">
        <div id="statusSpinner" class="spinner"></div>
        <div id="statusText">물리엔진 로딩…</div>
      </div>
    </div>

    <!-- 좌측: 입력 패널 -->
    <aside id="panel">
      <header class="panel-head">
        <h1>🎱 Marble Roulette</h1>
        <p class="hint">구슬 추첨 — 50개까지</p>
      </header>

      <section class="panel-section">
        <label>참가자
          <span class="hint">한 줄당 <code>이름*N</code> 또는 <code>이름,N</code>. 쉼표·줄바꿈 모두 OK.</span>
        </label>
        <textarea id="participants" rows="5" placeholder="안병민*3, 홍민지*3&#10;김부장*5"></textarea>
        <div class="row">
          <input id="addName" placeholder="이름" />
          <input id="addCount" type="number" min="1" max="50" value="1" />
          <button id="addBtn" type="button">+ 추가</button>
        </div>
        <div class="hint" id="participantsSummary">참가자 0명</div>
      </section>

      <section class="panel-section">
        <label>포상 등수</label>
        <div id="prizes"></div>
        <button id="addPrizeBtn" type="button" class="secondary">+ 등수 추가</button>
      </section>

      <div class="row sticky">
        <button id="startBtn" type="button" class="primary">▶ 시작</button>
        <button id="resetBtn" type="button" class="secondary">↺ 리셋</button>
      </div>
    </aside>

    <!-- 우측 상단: 리더보드 -->
    <ol id="leaderboard" class="leaderboard"></ol>

    <!-- 결과 오버레이 (숨김 시작) -->
    <div id="resultScreen" class="result hidden">
      <div class="result-card">
        <h2>🏆 결과</h2>
        <ol id="resultList"></ol>
        <button id="resultClose" type="button" class="primary">닫기</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
